<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>EMR 체크 — 24clinic</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Malgun Gothic', 'Apple SD Gothic Neo', sans-serif; background: #f5f5f5; font-size: 13px; }
.container { max-width: 520px; margin: 0 auto; padding: 12px; }
h1 { font-size: 15px; font-weight: 600; color: #333; margin-bottom: 10px; }

/* 탭 */
.tabs { display: flex; gap: 0; margin-bottom: 12px; border-bottom: 2px solid #e0e0e0; }
.tab { padding: 8px 16px; font-size: 13px; font-weight: 600; cursor: pointer; border: none; background: none; color: #888; border-bottom: 2px solid transparent; margin-bottom: -2px; font-family: inherit; }
.tab.active { color: #2c5f9e; border-bottom-color: #2c5f9e; }
.tab:hover { color: #555; }
.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* 카드 */
.card { background: #fff; border-radius: 8px; border: 1px solid #e0e0e0; padding: 12px; margin-bottom: 10px; }
label { font-size: 11px; color: #888; font-weight: 600; letter-spacing: .04em; display: block; margin-bottom: 5px; }
input[type=text], select, textarea { width: 100%; padding: 7px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 13px; font-family: inherit; }
input[type=text]:focus, select:focus, textarea:focus { outline: none; border-color: #4a90d9; }
textarea { resize: vertical; min-height: 60px; }
.hint { font-size: 11px; color: #aaa; margin-top: 4px; }
.row { display: flex; gap: 8px; }
.row > * { flex: 1; }

/* 버튼 */
.btn { width: 100%; padding: 10px; background: #2c5f9e; color: #fff; border: none; border-radius: 6px; font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit; }
.btn:hover { background: #1e4a80; }
.btn-sm { padding: 6px 12px; font-size: 12px; width: auto; }
.btn-outline { background: #fff; color: #2c5f9e; border: 1px solid #2c5f9e; }
.btn-outline:hover { background: #f0f4fa; }
.btn-green { background: #2e7d32; }
.btn-green:hover { background: #1b5e20; }

/* 결과 */
.results { margin-top: 10px; }
.ri { padding: 9px 12px; border-radius: 6px; margin-bottom: 6px; font-size: 13px; display: flex; gap: 8px; align-items: flex-start; }
.ri-ok { background: #e8f5e9; color: #2e7d32; }
.ri-warn { background: #fff8e1; color: #f57f17; }
.ri-err { background: #ffebee; color: #c62828; }
.ri-info { background: #e3f2fd; color: #1565c0; }
.ico { font-size: 13px; flex-shrink: 0; font-weight: bold; }
.sub { font-size: 11px; opacity: .75; margin-top: 2px; }
.src { font-size: 10px; opacity: .5; margin-top: 2px; }

/* 템플릿 */
.tpl-group { margin-bottom: 16px; }
.tpl-group-title { font-size: 12px; font-weight: 700; color: #2c5f9e; margin-bottom: 8px; padding-bottom: 4px; border-bottom: 1px solid #e8ecf1; }
.tpl-item { background: #fff; border: 1px solid #e0e0e0; border-radius: 6px; padding: 10px 12px; margin-bottom: 8px; cursor: pointer; transition: border-color .15s; }
.tpl-item:hover { border-color: #4a90d9; }
.tpl-item.selected { border-color: #2c5f9e; background: #f0f4fa; }
.tpl-name { font-weight: 600; font-size: 13px; }

/* 미리보기 */
.preview-area { background: #fff; border: 1px solid #e0e0e0; border-radius: 8px; padding: 14px; margin-top: 10px; }
.preview-text { white-space: pre-wrap; line-height: 1.8; font-size: 12.5px; color: #333; min-height: 60px; }
.field-row { display: flex; gap: 6px; align-items: center; margin-bottom: 6px; }
.field-label { font-size: 11px; font-weight: 600; color: #666; min-width: 60px; text-align: right; }
.field-input { flex: 1; padding: 5px 8px; border: 1px solid #ddd; border-radius: 4px; font-size: 12px; font-family: inherit; }
.copy-toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #333; color: #fff; padding: 8px 20px; border-radius: 20px; font-size: 13px; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 100; }
.copy-toast.show { opacity: 1; }

/* 이미지 붙여넣기 영역 */
.paste-zone { border: 2px dashed #ccc; border-radius: 8px; padding: 12px; text-align: center; cursor: pointer; margin-top: 6px; transition: border-color .2s, background .2s; }
.paste-zone:hover, .paste-zone:focus { border-color: #4a90d9; background: #f0f4fa; outline: none; }
.paste-zone.has-image { border-color: #2e7d32; background: #e8f5e9; }
.paste-icon { font-size: 20px; color: #aaa; display: block; }
.paste-text { font-size: 11px; color: #999; }
.paste-zone.loading .paste-text { color: #2c5f9e; }
.ocr-result { font-size: 11px; color: #2e7d32; margin-top: 4px; }

/* 상태표시 */
.status { font-size: 11px; color: #999; text-align: center; margin-top: 8px; }
</style>
</head>
<body>
<div class="container">
  <h1>EMR 체크 — 24시 열린의원</h1>

  <div class="tabs">
    <button class="tab active" onclick="switchTab('check')">체크</button>
    <button class="tab" onclick="switchTab('tpl')">차팅/양식</button>
  </div>

  <!-- ═══ 체크 탭 ═══ -->
  <div id="panel-check" class="tab-panel active">

    <!-- 전체 캡처 (한번에) -->
    <div class="card" style="background:#f0f4fa; border-color:#4a90d9;">
      <label style="color:#2c5f9e;">전체 캡처 (Win+Shift+S → 의사랑 전체 → Ctrl+V)</label>
      <div class="paste-zone" id="full-paste" tabindex="0" style="min-height:60px;">
        <span class="paste-icon">+</span>
        <span class="paste-text" id="full-paste-text">의사랑 전체 화면을 캡처해서 여기에 붙여넣기</span>
        <canvas id="full-canvas" style="display:none; max-width:100%; margin-top:6px; cursor:crosshair; border:1px solid #ddd; border-radius:4px;"></canvas>
      </div>
      <div id="calib-guide" style="display:none; font-size:11px; color:#c62828; margin-top:4px; font-weight:600;"></div>
      <button id="calib-btn" class="btn btn-sm btn-outline" style="display:none; margin-top:6px;" onclick="startCalibration()">영역 다시 설정</button>
    </div>

    <div class="card">
      <div class="row">
        <div>
          <label>환자 구분</label>
          <select id="pt">
            <option value="성인">성인</option>
            <option value="소아">소아</option>
          </select>
        </div>
        <div>
          <label>BW (kg)</label>
          <input type="text" id="bw" placeholder="체중" style="width:60px;">
        </div>
      </div>
    </div>

    <div class="card">
      <label>1. 증상 (차팅)</label>
      <textarea id="symptoms" rows="3" placeholder="의사랑 증상탭에서 Ctrl+C → 여기 Ctrl+V&#10;또는 Win+Shift+S 캡처 → 아래 영역에 Ctrl+V"></textarea>
      <div class="paste-zone" id="symptoms-paste" tabindex="0">
        <span class="paste-icon">+</span>
        <span class="paste-text">증상 탭 캡처 → Ctrl+V</span>
        <img id="symptoms-img" style="display:none; max-width:100%; margin-top:6px; border-radius:4px;">
      </div>
    </div>

    <div class="card">
      <label>2. 특이증상 (과거력)</label>
      <textarea id="special" rows="2" placeholder="의사랑 특이증상탭에서 Ctrl+C → 여기 Ctrl+V&#10;또는 캡처 → 아래 영역에 Ctrl+V"></textarea>
      <div class="paste-zone" id="special-paste" tabindex="0">
        <span class="paste-icon">+</span>
        <span class="paste-text">특이증상 탭 캡처 → Ctrl+V</span>
        <img id="special-img" style="display:none; max-width:100%; margin-top:6px; border-radius:4px;">
      </div>
    </div>

    <div class="card">
      <label>3. 상병코드</label>
      <input type="text" id="dx" placeholder="직접 입력 또는 캡처 → Ctrl+V">
      <div class="paste-zone" id="dx-paste" tabindex="0">
        <span class="paste-icon">+</span>
        <span class="paste-text">상병 영역 캡처 → Ctrl+V</span>
        <img id="dx-img" style="display:none; max-width:100%; margin-top:6px; border-radius:4px;">
      </div>
    </div>

    <div class="card">
      <label>4. 오더코드</label>
      <input type="text" id="orders" placeholder="직접 입력 또는 캡처 → Ctrl+V">
      <div class="paste-zone" id="orders-paste" tabindex="0">
        <span class="paste-icon">+</span>
        <span class="paste-text">오더 영역 캡처 → Ctrl+V</span>
        <img id="orders-img" style="display:none; max-width:100%; margin-top:6px; border-radius:4px;">
      </div>
    </div>

    <button class="btn" onclick="runCheck()">스캔하기</button>

    <div class="results" id="results"></div>
    <div class="status" id="check-status"></div>
  </div>

  <!-- ═══ 차팅/양식 탭 ═══ -->
  <div id="panel-tpl" class="tab-panel">
    <div class="card">
      <label>카테고리</label>
      <select id="tpl-cat" onchange="filterTemplates()">
        <option value="">전체</option>
        <option value="진료의뢰서">진료의뢰서</option>
        <option value="진단서">진단서/소견서</option>
        <option value="독감">독감</option>
        <option value="기타">기타</option>
        <option value="오더가이드">오더 가이드</option>
      </select>
    </div>

    <div id="tpl-list"></div>

    <!-- 선택된 템플릿 미리보기 -->
    <div id="tpl-preview" style="display:none;">
      <div class="preview-area">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
          <strong id="tpl-preview-title" style="font-size:13px;"></strong>
          <button class="btn btn-sm btn-green" onclick="copyTemplate()">복사</button>
        </div>
        <div id="tpl-fields"></div>
        <div class="preview-text" id="tpl-preview-text"></div>
      </div>
    </div>
  </div>
</div>

<div class="copy-toast" id="toast">복사 완료</div>

<script>
/* ═══ 탭 전환 ═══ */
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById('panel-' + name).classList.add('active');
  event.target.classList.add('active');
  if (name === 'tpl' && !window._tplLoaded) loadTemplates();
}

/* ═══ 전체 캡처 → 4영역 자동 분할 ═══ */
const REGION_NAMES = ['symptoms', 'special', 'dx', 'orders'];
const REGION_LABELS = {
  symptoms: '① 증상(차팅)',
  special: '② 특이증상(과거력)',
  dx: '③ 상병코드',
  orders: '④ 오더목록'
};
let calibRegions = JSON.parse(localStorage.getItem('emr_regions') || 'null');
let calibClicks = [];
let calibStep = 0;
let fullImage = null;

function setupFullPaste() {
  const zone = document.getElementById('full-paste');
  const canvas = document.getElementById('full-canvas');
  const ctx = canvas.getContext('2d');

  zone.addEventListener('paste', async (e) => {
    const items = e.clipboardData?.items;
    if (!items) return;
    for (const item of items) {
      if (item.type.startsWith('image/')) {
        e.preventDefault();
        const blob = item.getAsFile();
        const img = new Image();
        img.onload = () => {
          fullImage = img;
          // 캔버스에 표시
          const maxW = zone.clientWidth - 24;
          const scale = Math.min(maxW / img.width, 1);
          canvas.width = img.width * scale;
          canvas.height = img.height * scale;
          canvas.style.display = 'block';
          ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

          if (calibRegions) {
            // 캘리브레이션 완료됨 → 바로 분할+OCR
            drawRegionBoxes(ctx, canvas.width, canvas.height);
            autoSplitAndOcr(img);
          } else {
            // 캘리브레이션 필요
            startCalibration();
          }
        };
        img.src = URL.createObjectURL(blob);
        return;
      }
    }
  });
  zone.addEventListener('click', (e) => {
    if (calibStep > 0 && fullImage) {
      handleCalibClick(e);
    } else {
      zone.focus();
    }
  });
}

function startCalibration() {
  calibClicks = [];
  calibStep = 1;
  calibRegions = null;
  localStorage.removeItem('emr_regions');
  document.getElementById('calib-guide').style.display = 'block';
  document.getElementById('calib-guide').textContent =
    '① 증상(차팅) 영역의 좌상단을 클릭하세요';
  document.getElementById('calib-btn').style.display = 'none';
  document.getElementById('full-paste-text').textContent = '이미지 위에서 영역을 클릭하세요';
}

function handleCalibClick(e) {
  const canvas = document.getElementById('full-canvas');
  const rect = canvas.getBoundingClientRect();
  const x = (e.clientX - rect.left) / canvas.width;
  const y = (e.clientY - rect.top) / canvas.height;
  calibClicks.push({x, y});

  // 4개 영역 x 좌상단+우하단 = 8클릭
  const steps = [
    '① 증상(차팅) 좌상단', '① 증상(차팅) 우하단',
    '② 특이증상(과거력) 좌상단', '② 특이증상(과거력) 우하단',
    '③ 상병코드 좌상단', '③ 상병코드 우하단',
    '④ 오더목록 좌상단', '④ 오더목록 우하단'
  ];

  // 클릭한 점 표시
  const ctx = canvas.getContext('2d');
  ctx.fillStyle = '#c62828';
  ctx.beginPath();
  ctx.arc(x * canvas.width, y * canvas.height, 4, 0, Math.PI * 2);
  ctx.fill();

  if (calibClicks.length < 8) {
    document.getElementById('calib-guide').textContent =
      steps[calibClicks.length] + '을 클릭하세요 (' + calibClicks.length + '/8)';
  } else {
    // 캘리브레이션 완료
    calibRegions = {};
    for (let i = 0; i < 4; i++) {
      const tl = calibClicks[i * 2];
      const br = calibClicks[i * 2 + 1];
      calibRegions[REGION_NAMES[i]] = {
        x1: Math.min(tl.x, br.x), y1: Math.min(tl.y, br.y),
        x2: Math.max(tl.x, br.x), y2: Math.max(tl.y, br.y)
      };
    }
    localStorage.setItem('emr_regions', JSON.stringify(calibRegions));
    calibStep = 0;
    document.getElementById('calib-guide').textContent = '영역 설정 완료! 다음부터 자동 분할됩니다.';
    document.getElementById('calib-btn').style.display = 'inline-block';

    // 박스 그리기 + OCR
    drawRegionBoxes(ctx, canvas.width, canvas.height);
    autoSplitAndOcr(fullImage);
  }
}

function drawRegionBoxes(ctx, cw, ch) {
  if (!calibRegions) return;
  const colors = ['#2c5f9e', '#6a1b9a', '#c62828', '#2e7d32'];
  REGION_NAMES.forEach((name, i) => {
    const r = calibRegions[name];
    ctx.strokeStyle = colors[i];
    ctx.lineWidth = 2;
    ctx.strokeRect(r.x1 * cw, r.y1 * ch, (r.x2 - r.x1) * cw, (r.y2 - r.y1) * ch);
    ctx.fillStyle = colors[i];
    ctx.font = '11px sans-serif';
    ctx.fillText(REGION_LABELS[name], r.x1 * cw + 4, r.y1 * ch + 14);
  });
}

async function autoSplitAndOcr(img) {
  if (!calibRegions) return;
  document.getElementById('full-paste-text').textContent = 'OCR 처리 중... (4개 영역)';

  for (const name of REGION_NAMES) {
    const r = calibRegions[name];
    // 원본 이미지에서 해당 영역 크롭
    const cropCanvas = document.createElement('canvas');
    const cx = Math.round(r.x1 * img.width);
    const cy = Math.round(r.y1 * img.height);
    const cw = Math.round((r.x2 - r.x1) * img.width);
    const ch = Math.round((r.y2 - r.y1) * img.height);
    cropCanvas.width = cw;
    cropCanvas.height = ch;
    cropCanvas.getContext('2d').drawImage(img, cx, cy, cw, ch, 0, 0, cw, ch);

    // base64 변환
    const b64 = cropCanvas.toDataURL('image/png').split(',')[1];

    // OCR 요청
    try {
      const resp = await fetch('/ocr', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({ image_base64: b64, region: name })
      });
      const data = await resp.json();

      const input = document.getElementById(name === 'symptoms' ? 'symptoms' :
                                             name === 'special' ? 'special' :
                                             name === 'dx' ? 'dx' : 'orders');
      if (name === 'symptoms' || name === 'special') {
        input.value = data.text || '';
      } else if (data.codes && data.codes.length > 0) {
        input.value = data.codes.join(' ');
      }

      // 개별 영역 미리보기 업데이트
      const zone = document.getElementById(name + '-paste');
      if (zone) {
        const zoneText = zone.querySelector('.paste-text');
        if (name === 'symptoms' || name === 'special') {
          zoneText.textContent = 'OCR: ' + (data.text || '').substring(0, 40);
        } else {
          zoneText.textContent = 'OCR: ' + (data.codes || []).join(', ');
        }
        zone.classList.add('has-image');
      }
    } catch (err) {
      console.error(name, err);
    }
  }

  document.getElementById('full-paste-text').textContent = 'OCR 완료! 아래에서 결과를 확인하세요.';
  document.getElementById('calib-btn').style.display = 'inline-block';
}

setupFullPaste();

/* ═══ 이미지 붙여넣기 → OCR ═══ */
function setupPasteZone(zoneId, imgId, inputId, region) {
  const zone = document.getElementById(zoneId);
  const img = document.getElementById(imgId);
  const input = document.getElementById(inputId);

  zone.addEventListener('paste', async (e) => {
    const items = e.clipboardData?.items;
    if (!items) return;
    for (const item of items) {
      if (item.type.startsWith('image/')) {
        e.preventDefault();
        const blob = item.getAsFile();
        // 미리보기 표시
        const url = URL.createObjectURL(blob);
        img.src = url;
        img.style.display = 'block';
        zone.classList.add('has-image', 'loading');
        zone.querySelector('.paste-text').textContent = 'OCR 처리 중...';

        // base64 변환
        const reader = new FileReader();
        reader.onload = async () => {
          const b64 = reader.result.split(',')[1];
          try {
            const resp = await fetch('/ocr', {
              method: 'POST',
              headers: {'Content-Type': 'application/json'},
              body: JSON.stringify({ image_base64: b64, region: region })
            });
            const data = await resp.json();
            zone.classList.remove('loading');
            if (region === 'symptoms' || region === 'special') {
              // 증상/특이증상은 텍스트 그대로
              input.value = data.text || '';
              zone.querySelector('.paste-text').textContent =
                'OCR 완료 (' + (data.text || '').length + '자)';
            } else if (data.codes && data.codes.length > 0) {
              input.value = data.codes.join(' ');
              zone.querySelector('.paste-text').textContent =
                'OCR 완료: ' + data.codes.join(', ');
            } else {
              zone.querySelector('.paste-text').textContent =
                'OCR 텍스트: ' + (data.text || '인식 실패').substring(0, 80);
            }
          } catch (err) {
            zone.classList.remove('loading');
            zone.querySelector('.paste-text').textContent = 'OCR 오류: ' + err.message;
          }
        };
        reader.readAsDataURL(blob);
        return;
      }
    }
  });

  // 클릭 시 포커스 (Ctrl+V 받기 위해)
  zone.addEventListener('click', () => zone.focus());
}

// 페이지 로드 시 붙여넣기 영역 설정
setupPasteZone('symptoms-paste', 'symptoms-img', 'symptoms', 'symptoms');
setupPasteZone('special-paste', 'special-img', 'special', 'special');
setupPasteZone('dx-paste', 'dx-img', 'dx', 'dx');
setupPasteZone('orders-paste', 'orders-img', 'orders', 'orders');

/* ═══ 체크 기능 ═══ */
function parse(str) {
  return str.split(/[\s,]+/).map(s => s.trim()).filter(Boolean);
}

async function runCheck() {
  const dx = parse(document.getElementById('dx').value);
  const orders = parse(document.getElementById('orders').value);
  const symptoms = document.getElementById('symptoms').value;
  const pt = document.getElementById('pt').value;

  if (!dx.length && !orders.length) {
    document.getElementById('results').innerHTML =
      '<div class="ri ri-info"><span class="ico">i</span><div>상병코드 또는 오더코드를 입력해주세요</div></div>';
    return;
  }

  const resp = await fetch('/check', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({ dx, orders, symptoms, patient_type: pt })
  });

  const data = await resp.json();
  const ico = { err: '\u2715', warn: '!', info: 'i', ok: '\u2713' };
  const cls = { err: 'ri-err', warn: 'ri-warn', info: 'ri-info', ok: 'ri-ok' };

  const errCount = data.filter(r => r.level === 'err').length;
  const warnCount = data.filter(r => r.level === 'warn').length;

  document.getElementById('results').innerHTML = data.map(r => `
    <div class="ri ${cls[r.level]}">
      <span class="ico">${ico[r.level]}</span>
      <div>
        <div>${r.message}</div>
        ${r.sub ? `<div class="sub">${r.sub}</div>` : ''}
        ${r.source ? `<div class="src">${r.source}</div>` : ''}
      </div>
    </div>
  `).join('');

  const status = errCount > 0
    ? `오류 ${errCount}건` + (warnCount ? `, 주의 ${warnCount}건` : '')
    : warnCount > 0
      ? `주의 ${warnCount}건`
      : '이상 없음';
  document.getElementById('check-status').textContent = `dx ${dx.length}건, orders ${orders.length}건 | ${status}`;
}

/* ═══ 템플릿 기능 ═══ */
let allTemplates = [];
let selectedTemplate = null;

async function loadTemplates() {
  const resp = await fetch('/templates');
  allTemplates = await resp.json();
  window._tplLoaded = true;
  filterTemplates();
}

function filterTemplates() {
  const cat = document.getElementById('tpl-cat').value;
  const filtered = cat ? allTemplates.filter(t => t.category === cat) : allTemplates;

  // 카테고리별 그룹
  const groups = {};
  filtered.forEach(t => {
    if (!groups[t.category]) groups[t.category] = [];
    groups[t.category].push(t);
  });

  let html = '';
  for (const [cat, items] of Object.entries(groups)) {
    html += `<div class="tpl-group"><div class="tpl-group-title">${cat}</div>`;
    items.forEach(t => {
      html += `<div class="tpl-item" onclick="selectTemplate('${t.id}')">
        <span class="tpl-name">${t.name}</span>
      </div>`;
    });
    html += '</div>';
  }
  document.getElementById('tpl-list').innerHTML = html;
  document.getElementById('tpl-preview').style.display = 'none';
  selectedTemplate = null;
}

function selectTemplate(id) {
  const t = allTemplates.find(x => x.id === id);
  if (!t) return;
  selectedTemplate = t;

  // 선택 상태 표시
  document.querySelectorAll('.tpl-item').forEach(el => el.classList.remove('selected'));
  event.currentTarget.classList.add('selected');

  // 필드 입력 UI
  let fieldsHtml = '';
  if (t.fields && t.fields.length > 0) {
    t.fields.forEach(f => {
      fieldsHtml += `<div class="field-row">
        <span class="field-label">${f}</span>
        <input class="field-input" data-field="${f}" placeholder="${f}" oninput="updatePreview()">
      </div>`;
    });
  }
  document.getElementById('tpl-fields').innerHTML = fieldsHtml;
  document.getElementById('tpl-preview-title').textContent = t.name;
  document.getElementById('tpl-preview').style.display = 'block';
  updatePreview();
}

function updatePreview() {
  if (!selectedTemplate) return;
  let text = selectedTemplate.template;
  document.querySelectorAll('.field-input').forEach(el => {
    const field = el.dataset.field;
    const val = el.value || `{${field}}`;
    text = text.replaceAll(`{${field}}`, val);
  });
  document.getElementById('tpl-preview-text').textContent = text;
}

function copyTemplate() {
  const text = document.getElementById('tpl-preview-text').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const toast = document.getElementById('toast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1500);
  });
}

/* ═══ 키보드 ═══ */
document.addEventListener('keydown', e => {
  if (e.key === 'F12') { e.preventDefault(); runCheck(); }
  if (e.key === 'Enter' && document.getElementById('panel-check').classList.contains('active')) {
    runCheck();
  }
});
